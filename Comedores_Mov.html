<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Asistencia Solidaria</title>  
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"> 
    <link rel="stylesheet" href="./CSS/CSS-Contacto.css">
    <link rel="icon" href="./IMG/Logo_chico.jpg">
</head>
<body>    
    <header>
        <img src="./IMG/Logo ONG.PNG" alt="Logo_ONG" height="100">
        <div class="titulo">
            <h1>Red Asistencia Solidaria ONG</h1>
        </div>
        <div class="nav-nav">
            <ul class="nav nav-underline">
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="index.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="Programas.html">Programas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="Nosotros.html">Nosotros</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="Contacto.html">Contacto</a>
                </li>
            </ul>
        </div>
    </header>    
    <main>
        <h2>Comedores Moviles 🥘</h2>
        <p>Tambien podes escribinos a: <a href="mailto:info@redasistenciasolidaria.org.ar">redasistenciasolidaria@gmail.org.ar</a></p>
        <form id="form" action="#" method="post" novalidate>
            <div class="nombre_apellido">
                <label>Nombre Apellido</label>
                <input type="text" id="nombre" placeholder="Ej. Esteban Quito" required>
            </div>
            <div class="email">
                <label>Email</label>
                <input type="email" id="email" placeholder="ejemplo@gmail.com.ar" required> 
            </div>
            <div class="telefono">            
                <label>Telefono</label>
                <input type="tel" id="telefono" placeholder="+ 54 11 3504-7312" required>
            </div>
            <div class="programa">
                <label>Seleccionar</label>
                <select id="programa" required>
                    <option value="">Elegir programa...</option>
                    <option value="cm">Chef Moviles</option>
                    <option value="ca">Ayuda distribucion</option>
                    <option value="ec">Oganizar logística</option>
                </select>
            </div>
            <div class="disponibilidad">
                <label>Disponibilidad</label>
                <select id="disp" required>
                    <option value="">Turno</option>
                    <option value="Manana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                    <option value="Noche">Noche</option>
                </select>
            </div>
            <div class="mensaje">
                <label>Mensaje</label>
                <textarea id="mensaje" rows="4" placeholder="Contanos un poco"></textarea>
            </div>
            <div id="msg-form"></div>
            <div class="enviar">
            <button type="submit">Enviar</button>
            </div>
        </form>
    </main>
    <button id="btn-modo" class="btn btn-outline-secondary btn-sm">Modo Oscuro 🌑</button>
    <script src="./JS/Modos_y_Formulario.js"></script>
    <footer>
        <p>Estamos en <a href="https://www.google.com/maps/place/Cruz+Roja+Argentina+-+Filial+Santos+Lugares/@-34.5978989,-58.5426053,17z/data=!4m15!1m8!3m7!1s0x95bcb791fad754f9:0x826ab01a4b998e25!2sCruz+Roja+Argentina+-+Filial+Santos+Lugares!8m2!3d-34.5980988!4d-58.542598!10e5!16s%2Fg%2F11bbrp2qsh!3m5!1s0x95bcb791fad754f9:0x826ab01a4b998e25!8m2!3d-34.5980988!4d-58.542598!16s%2Fg%2F11bbrp2qsh?entry=ttu&g_ep=EgoyMDI2MDUxMi4wIKXMDSoASAFQAw%3D%3D" target="_blank"> Cruz Roja Argentina</a>    
        <p>&copy; 2026 Red Asistencia Solidaria ONG</p>
    </footer>
</body>
</html>
