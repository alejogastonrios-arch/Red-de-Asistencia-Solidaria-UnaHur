<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Asistencia Solidaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist.css/bootstrap.min.css">
    <link rel="stylesheet" href="./CSS/CSS-Contacto.css">
    <link rel="icon" href="./IMG/Logo_chico.jpg">
</head>
<body>
    <header>
        <img src="./IMG/Logo ONG.PNG" alt="Logo_ONG" height="100">
        <div class="titulo">
            <h1>Red Asistencia Solidaria ONG</h1>
        </div>
        <div class="navegacion">
            <nav>
                <ul>
                    <li><a href="./index.html">Inicio</a></li>
                    <li><a href="./Programas.html">Programas</a></li>
                    <li><a href="./Nosotros.html">Nosotros</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <h2>Sumate como volunatrio</h2>
        <p>Completa el formulario o escribinos a: <a href="mailto:info@redasistenciasolidaria.org.ar">redasistenciasolidaria@gmail.org.ar</a></p>
        <form action="#" method="post">
            <div class="nombre_apellido">
                <label>Nombre Apellido</label>
                <input type="text" name="nombre" placeholder="Ej. Esteban Quito" required>
            </div>
            <div class="email">
                <label>Email</label>
                <input type="email" name="email" placeholder="ejemplo@gmail.com.ar" required> 
            </div>
            <div class="telefono">            
                <label> Telefono</label>
                <input type="tel" name="telefono" placeholder="+ 54 11 3504-7312" required>
            </div>
            <div class="programa">
                <label>Selecionar</label>
                <select name="programa" required>
                    <option value="">Elegir programa...</option>
                    <option value="ccm">Chef Comeores Moviles</option>
                    <option value="ca">Donacion alimentaria</option>
                    <option value="ec">Ecuelas Conectadas</option>
                </select>
            </div>
            <div class="disponibilidad">
                <label>Disponibilidad</label>
                <select name="Disponibilidad" required>
                    <option value="">Turno</option>
                    <option value="Manana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                    <option value="Noche">Noche</option>
                </select>
            </div>
            <div class="mensaje">
                <label>Mensaje</label>
                <textarea name="mensaje" rows="4 " placeholder="Contanos un poco"></textarea>
            </div>
            <div class="enviar">
                <button type="submit">Enviar</button>
            </div>
        </form>
    </main>
    <button id="btn-modo" class="btn btn-outline-secondary btn-sm">Modo Oscuro</button>
    <script src="./JS/Modos_y_Formulario.js"></script>

</body>
</html>
